<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WechatAssistantAgent</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <aside class="sidebar">
        <h2>Wechat Assistant</h2>
        <nav>
            <a href="/" class="active">运行状态</a>
            <a href="/config">模型配置</a>
            <a href="/wechat-config">微信参数</a>
            <a href="/templates">话术模板</a>
            <a href="/calibration">视觉校准</a>
            <a href="/monitor">运行监控</a>
        </nav>
    </aside>

    <main class="content">
        <h1>运行状态</h1>

        <div class="card">
            <h3>Agent 状态</h3>
            <p><span id="statusDot" class="status-dot stopped"></span><span id="statusText">已停止</span></p>
            <p>当前阶段: <span id="stateBadge" class="state-badge">IDLE</span></p>
            <p>当前联系人: <span id="activeContact">--</span></p>
            <p>最后消息: <span id="lastMessage">--</span></p>
            <p>连续失败: <span id="consecutiveFailures">0</span></p>
            <p>已加载工具: <span id="toolsLoaded">0</span></p>
            <p>已加载技能: <span id="skillsLoaded">0</span></p>

            <div style="margin-top: 15px;">
                <button class="btn btn-success" onclick="startAgent()">启动</button>
                <button class="btn btn-danger" onclick="stopAgent()">停止</button>
                <button class="btn btn-primary" onclick="refreshStatus()">刷新</button>
            </div>
        </div>

        <div class="card">
            <h3>最近操作</h3>
            <div id="recentActions" class="log-display">暂无操作记录</div>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/monitor.js"></script>
</body>
</html>
